{{define "title" }}Create Snippet {{end}} {{define "main"}}
<form action="/snippet/create" method="POST">
  <div>
    <label for="title">Title:</label>
    <input type="text" name="title" id="title" />
  </div>

  <div>
    <label for="content">Content:</label>
    <input type="text" name="content" id="content" />
  </div>

  <div>
    <label for="expires">Delete in:</label>
    <input type="radio" name="expires" id="" value="365" /> One Year
    <input type="radio" name="expires" id="" value="7" /> One Week
    <input type="radio" name="expires" id="" value="1" /> One Day
  </div>

  <div>
    <input type="submit" value="Publish Snippet" />
  </div>
</form>
{{end}}
